version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pdf-chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull the default model on first start
    # Run manually: docker exec pdf-chatbot-ollama ollama pull phi3

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-chatbot-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
